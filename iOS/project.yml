name: Insurewallet
options:
  bundleIdPrefix: com.shimondeitel.insurewallet
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Insurewallet:
    type: application
    platform: iOS
    sources:
      - path: Insurewallet
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.insurewallet
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Insurewallet/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  InsurewalletTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: InsurewalletTests
      - path: Insurewallet.storekit
    dependencies:
      - target: Insurewallet
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.insurewallet.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  InsurewalletUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: InsurewalletUITests
    dependencies:
      - target: Insurewallet
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.insurewallet.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Insurewallet:
    build:
      targets:
        Insurewallet: all
        InsurewalletTests: [test]
        InsurewalletUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Insurewallet.storekit
    test:
      config: Debug
      storeKitConfiguration: Insurewallet.storekit
      targets:
        - InsurewalletTests
        - InsurewalletUITests
    archive:
      config: Release
